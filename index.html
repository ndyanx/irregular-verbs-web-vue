<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="author" content="Randy Bryan" />
        <meta name="copyright" content="© 2025 Randy Bryan" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta
            name="description"
            content="Aprende verbos irregulares en inglés con tabla interactiva, pronunciación y juegos."
        />
        <meta name="theme-color" content="#2f6f5e" />
        <meta property="og:type" content="website" />
        <meta property="og:title" content="Verbos Irregulares en Inglés" />
        <meta
            property="og:description"
            content="Tabla, pronunciación y juegos para dominar los verbos irregulares."
        />
        <meta property="og:image" content="/favicon.ico" />
        <link rel="icon" href="/favicon.ico" sizes="any" />

        <title>Verbos Irregulares en Inglés</title>

        <!-- CSS crítico inlineado: variables, reset y body para la primera pintura -->
        <style>
            /* Fallback con métricas ajustadas para evitar CLS al cargar Sora/Inter */
            @font-face {
                font-family: "Sora-fallback";
                src: local("Arial");
                size-adjust: 100%;
                ascent-override: 95%;
                descent-override: 25%;
                line-gap-override: 0%;
            }
            @font-face {
                font-family: "Inter-fallback";
                src: local("Arial");
                size-adjust: 100%;
                ascent-override: 90%;
                descent-override: 22%;
                line-gap-override: 0%;
            }

            :root {
                --ink: #1c1d1f;
                --ink-soft: #5b5e63;
                --ink-faint: #8a8d92;
                --paper: #faf9f7;
                --surface: #ffffff;
                --line: #e6e3dd;
                --line-strong: #d4d0c8;
                --accent: #2f6f5e;
                --accent-dark: #235448;
                --accent-soft: #e8f0ec;
                --accent-soft-strong: #d4e6dd;
                --warn: #b5482f;
                --warn-soft: #f5e6e1;
                --focus-ring: rgba(47, 111, 94, 0.35);
                --primary: var(--accent);
                --primary-light: var(--accent-dark);
                --text: var(--ink);
                --text-light: var(--ink-soft);
                --bg: var(--paper);
                --card: var(--surface);
                --border: var(--line);
                --success: var(--accent);
                --danger: var(--warn);
                --warning: #b5482f;
                --font-display: "Sora", "Sora-fallback", sans-serif;
                --font-body: "Inter", "Inter-fallback", sans-serif;
                --radius-sm: 8px;
                --radius: 12px;
                --radius-lg: 16px;
                --shadow-sm: 0 1px 2px rgba(28, 29, 31, 0.06);
                --shadow: 0 4px 16px rgba(28, 29, 31, 0.08);
                --shadow-lg: 0 12px 32px rgba(28, 29, 31, 0.12);
                --transition: all 0.2s ease;
                --header-height: 72px;
                --control-item-bg: var(--accent-soft);
            }
            *,
            *::before,
            *::after {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            html,
            body {
                height: 100%;
            }
            body {
                font-family: var(--font-body);
                background-color: var(--bg);
                color: var(--text);
                line-height: 1.6;
                transition: var(--transition);
                display: flex;
                flex-direction: column;
            }
            h1,
            h2,
            h3,
            h4 {
                font-family: var(--font-display);
                letter-spacing: -0.01em;
            }
            a:focus-visible,
            button:focus-visible,
            input:focus-visible,
            select:focus-visible,
            textarea:focus-visible,
            [tabindex]:focus-visible {
                outline: 2px solid var(--accent);
                outline-offset: 2px;
            }
            @media (prefers-reduced-motion: reduce) {
                *,
                *::before,
                *::after {
                    animation-duration: 0.01ms !important;
                    animation-iteration-count: 1 !important;
                    transition-duration: 0.01ms !important;
                    scroll-behavior: auto !important;
                }
            }
        </style>
    </head>
    <body>
        <div id="app"></div>
        <script type="module" src="/src/main.js"></script>
    </body>
</html>
